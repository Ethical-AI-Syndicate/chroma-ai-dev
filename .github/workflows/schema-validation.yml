name: Schema Validation

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate-schemas:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        components: rustfmt, clippy

      - name: Build (runs build.rs)
      run: cargo build

      - name: Verify ChromaTUI pinned revision
      run: |
        tree_output="$(cargo tree --features tui)"
        if [[ "$tree_output" != *"chromatui v"* ]]; then
          echo "chromatui dependency not present in tree"
          exit 1
        fi
        if [[ "$tree_output" != *"db3bde36"* ]]; then
          echo "chromatui pinned revision mismatch (expected db3bde36)"
          exit 1
        fi

      - name: Run schema validation tests
      run: cargo test schema_validation

      - name: Run all tests
      run: cargo test

      - name: Check for generated code drift
      run: |
        if ! git diff --quiet src/generated/; then
          echo "Generated code is out of sync"
          git diff src/generated/
          exit 1
        fi

      - name: Lint
      run: cargo clippy -- -D warnings

      - name: Format check
      run: cargo fmt -- --check
